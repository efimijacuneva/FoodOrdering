{% extends 'base.html' %}
{% block title %}Change Password — Tasty Bites{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="mb-3">
        <a href="{% url 'profile' %}" class="text-muted small">
          <i class="fas fa-arrow-left me-1"></i>Back to Profile
        </a>
      </div>
      <div class="form-card">
        <h4 class="fw-bold mb-4"><i class="fas fa-key me-2" style="color:var(--primary)"></i>Change Password</h4>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            <input type="password" id="{{ field.id_for_label }}" name="{{ field.html_name }}"
                   class="form-control {% if field.errors %}is-invalid{% endif %}">
            {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 mt-2">
            <i class="fas fa-check me-1"></i>Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
