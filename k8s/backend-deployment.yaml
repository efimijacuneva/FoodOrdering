apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: food-ordering
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: backend
          image: efimijac/food-ordering-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: food-ordering-config
            - secretRef:
                name: food-ordering-secret
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Django writes to /app/media and /tmp
            capabilities:
              drop: ["ALL"]
          # Liveness: lightweight check that does NOT hit the database.
          # A failing DB should not kill a healthy pod — it cannot fix a DB outage.
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          # Readiness: same endpoint — pod is ready when Django can respond.
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
