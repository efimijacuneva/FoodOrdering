apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: food-ordering
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100   # appuser UID assigned by adduser --system in the Dockerfile
        runAsGroup: 101  # appgroup GID
      initContainers:
        - name: fix-media-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 100:101 /app/media"]
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
          securityContext:
            runAsUser: 0          # must be root to chown
            runAsNonRoot: false   # overrides pod-level policy for this init container only
      containers:
        - name: backend
          image: efimijac/food-ordering-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: food-ordering-config
            - secretRef:
                name: food-ordering-secret
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: food-ordering.local
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: food-ordering.local
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
