apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: food-ordering
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: false   # nginx master must bind to port 80 as root;
                              # worker processes drop to the 'nginx' user automatically.
      containers:
        - name: frontend
          image: efimijac/food-ordering-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: "backend.food-ordering.svc.cluster.local"
          volumeMounts:
            - name: media-storage
              mountPath: /app/media
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]   # needed to bind port 80
          # Liveness: check that nginx itself is running (no backend dependency).
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          # Readiness: proxy through nginx to Django's /health/ endpoint.
          # Pod only receives traffic when the backend is also healthy.
          readinessProbe:
            httpGet:
              path: /health/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
