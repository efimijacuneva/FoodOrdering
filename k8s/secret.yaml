# ── Kubernetes Secret — TEMPLATE ONLY ─────────────────────────────────────────
#
# This file is a documentation template. The actual secret is created (or
# updated) by the GitHub Actions deploy job using values stored in GitHub
# Secrets — it is NEVER read from this file during CI/CD.
#
# To create the secret manually (e.g. for local minikube testing):
#
#   kubectl create secret generic food-ordering-secret \
#     --namespace food-ordering \
#     --from-literal=SECRET_KEY="$(python -c 'from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())')" \
#     --from-literal=DB_USER="postgres" \
#     --from-literal=DB_PASSWORD="<strong-password>"
#
# Or apply this file after filling in real base64 values:
#   echo -n "your-value" | base64
#
# !! DO NOT commit real secrets to this file !!
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: food-ordering-secret
  namespace: food-ordering
  labels:
    app: food-ordering
type: Opaque
data:
  # Replace with: echo -n "<your-strong-secret-key>" | base64
  SECRET_KEY: ""

  # Replace with: echo -n "<db-username>" | base64
  DB_USER: ""

  # Replace with: echo -n "<strong-db-password>" | base64
  DB_PASSWORD: ""
